name: fav CI

on:
  push:
    branches: ["**"]
    paths: ["fav/**", "tests/**", "pyproject.toml", "conftest.py", ".github/workflows/fav-ci.yml"]
  pull_request:
    paths: ["fav/**", "tests/**", "pyproject.toml", "conftest.py", ".github/workflows/fav-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU PyTorch + test deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest
      - name: Run tests
        run: pytest -q
